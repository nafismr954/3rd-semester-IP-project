<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
<h2><u>Registration Form</u></h2>
    <form action="index.htm" target="_blank" autocomplete="on" method="post">

        <label>First Name:</label>

        <input type="text" placeholder="Enter your first name" name="firstname" /><br>
        <br>
        <label>Last Name:</label>

        <input type="text" placeholder="Enter your last name" name="lastname" />



        <br><br>
        <label>Age:</label>
        <input type="age" name="age" />
        <br><br>

        <label>Email:</label>

        <input type="email" placeholder="Enter your email" name="email" required />

        <br><br>

        <label>Password:</label>

        <input type="password" placeholder="Enter your password" name="password" required />

        <br><br>

        <label>Gender:</label>

        <input type="radio" name="gender" value="male" /><b>Male</b>

        <input type="radio" name="gender" value="female" /><b>Female</b>

        <input type="radio" name="gender" value="Other" /><b>Other</b>

        <br><br>
        <label>Hobby:</label>
        <input type="radio" name="hobby" value="music" /><b>Music</b>
        <input type="radio" name="hobby" value="Drawing" /><b>Drawing</b>
        <input type="radio" name="hobby" value="Teaching" /><b>Teaching</b>
        <input type="radio" name="hobby" value="sports" /><b>Sports</b>
        <br><br>
        <label>City:</label>
        <select name="City">
            <option value="Chattogram">Chattogram</option>
             <option value="Dhaka">Dhaka</option>
              <option value="Comilla">Comilla</option>
               <option value="Rajshahi">Rajshahi</option>
                <option value="Khulna">Khulna</option>
                 <option value="Pabna">Pabna</option>
        </select><br><br>
        <label>Phone number:</label>
        <input type="tel" name="Phone number" /><br><br>
        <label>Agreement:</label>

        <input type="checkbox" name="agree" />
        I agree

        <br><br>

        <!-- <label>Message:</label> -->

        <textarea name="message" placeholder="Enter your message"></textarea>

        <br><br>

        <button type="submit">Submit</button>
    </form>



</body>

</html>
